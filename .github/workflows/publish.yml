name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: npm install --global npm@11
      - run: bunx --package vite-plus@0.2.4 vp install --frozen-lockfile
      - run: bunx vp check
      - run: bunx vp run build
      - run: bunx vp test
      - run: bunx vp run version:check
      - run: npm publish ./packages/plugin --access public
      - run: npm publish ./packages/cli
