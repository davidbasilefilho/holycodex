name: Publish dev channel to npm

on:
  push:
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: npm-dev-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: npm install --global npm@11
      - run: bunx --package vite-plus@0.2.4 vp install --frozen-lockfile
      - run: bunx vp check
      - name: Derive unique dev version
        run: bun scripts/version.mjs dev "${{ github.run_number }}" "${{ github.run_attempt }}"
      - run: bunx vp run build
      - run: bunx vp test
      - run: bunx vp run version:check
      - run: npm publish ./packages/plugin --access public --tag dev
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm publish ./packages/cli --tag dev
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
